<?xml version="1.0" encoding="UTF-8"?>
<!--
  Chrome 网页助手 扩展图标源文件
  设计：teal #0D9488 圆角方块 + 白色 sparkles
  注意：使用纯色 fill（避免 ImageMagick SVG 渲染器对 gradient/currentColor 支持不一致）
-->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 圆角底板 -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="#0D9488"/>

  <!--
    Sparkles 图标，用 fill 描边代替 stroke 防糊
    原始 viewBox 24x24，居中放大到 80x80
    缩放：80/24 = 3.3333，平移 (24,24)
  -->
  <g transform="translate(24 24) scale(3.3333)" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/>
  </g>
  <!-- 周围四个小光点：直接画白色矩形（不依赖 stroke） -->
  <g fill="#FFFFFF">
    <!-- 上方左侧短线 (M5 3v4) -->
    <rect x="36.67" y="34" width="5" height="18" rx="2.5"/>
    <!-- 下方右侧短线 (M19 17v4) -->
    <rect x="86.33" y="80" width="5" height="18" rx="2.5"/>
    <!-- 左上横线 (M3 5h4) -->
    <rect x="30" y="40.67" width="18" height="5" rx="2.5"/>
    <!-- 右下横线 (M17 19h4) -->
    <rect x="80" y="86.33" width="18" height="5" rx="2.5"/>
  </g>
</svg>
