name: Release

on:
  push:
    branches: [master]

# 防止同一分支并发跑 release（避免 tag 冲突）
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST_TAG} → next: ${NEW_TAG}"

      - name: Sync version to package.json
        run: |
          # 用 node 改 package.json，避免正则误伤
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo 'Updated package.json:'
          grep '"version"' package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build extension
        run: pnpm build

      - name: Package dist as zip
        run: |
          cd dist
          zip -r "../chrome-assistant-${{ steps.version.outputs.tag }}.zip" .
          cd ..
          ls -la chrome-assistant-${{ steps.version.outputs.tag }}.zip

      - name: Create Git tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: chrome-assistant-${{ steps.version.outputs.tag }}.zip
          prerelease: false
          generate_release_notes: true
          body: |
            ## Chrome 网页表单助手 ${{ steps.version.outputs.tag }}

            ### 安装方式
            1. 下载下方 `chrome-assistant-${{ steps.version.outputs.tag }}.zip` 并解压
            2. 打开 `chrome://extensions/` → 开启右上角"开发者模式"
            3. 点击"加载已解压的扩展程序" → 选择解压后的目录
            4. 点击工具栏扩展图标，开始使用

            ### Installation
            1. Download `chrome-assistant-${{ steps.version.outputs.tag }}.zip` below and unzip it
            2. Open `chrome://extensions/` → enable "Developer mode" (top-right)
            3. Click "Load unpacked" → select the unzipped folder
            4. Click the extension icon in the toolbar to start

            ---
